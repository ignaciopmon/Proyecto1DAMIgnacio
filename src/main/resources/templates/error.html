<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg(v=1)}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <div class="container my-5 text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card p-4">
                    <div class="card-body">
                        <div class="alert alert-danger" role="alert">
                            <h4 class="alert-heading">¡Error!</h4>
                            <p class="mb-0">Algo ha salido mal en la aplicación.</p>
                        </div>
                        
                        <p class="my-4" th:text="${message != null} ? ${message} : 'Se ha producido un error inesperado en el servidor.'">
                            Descripción detallada del error.
                        </p>
                        
                        <a href="/" class="btn btn-primary">Volver al inicio</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer::footer}"></div>
</body>
</html>
