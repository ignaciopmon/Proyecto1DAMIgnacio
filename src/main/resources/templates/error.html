<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-sm p-4">
                    <div class="card-body">
                        <div class="text-danger mb-4">
                            <i class="bi bi-exclamation-triangle-fill" style="font-size: 3rem;"></i>
                        </div>
                        <h3 class="fw-bold text-dark">¡Ups! Algo ha salido mal</h3>
                        <p class="text-muted mt-3 mb-4" th:text="${message != null} ? ${message} : 'Se ha producido un error inesperado en el servidor.'">
                            Descripción detallada del error.
                        </p>
                        <a href="/" class="btn btn-primary w-100 py-2">
                            Volver al inicio
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
