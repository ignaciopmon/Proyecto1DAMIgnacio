<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error en la Solicitud - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg(v=1)}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar::navbar}"></div>

    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    
                    <div class="card border-0 shadow-sm rounded-3 p-4 text-center">
                        <div class="card-body">
                            
                            <div class="bg-danger bg-opacity-10 text-danger rounded-circle p-3 d-inline-flex align-items-center justify-content-center mb-4" style="width: 64px; height: 64px;">
                                <i class="bi bi-exclamation-triangle-fill fs-3"></i>
                            </div>

                            <h3 class="fw-bold text-dark mb-2">Ha ocurrido una incidencia</h3>
                            <p class="text-secondary small mb-4">No se ha podido procesar la solicitud actual debido al siguiente problema:</p>

                            <div class="alert alert-secondary border-0 p-3 rounded-3 mb-5 text-start">
                                <i class="bi bi-info-circle-fill text-secondary me-2"></i>
                                <span class="small" th:text="${message != null} ? ${message} : 'Se ha producido un error inesperado en el servidor de base de datos o de aplicación.'">
                                    Mensaje explicativo de la excepción
                                </span>
                            </div>

                            <div class="d-flex justify-content-center">
                                <div th:replace="~{fragments/indexreturn::indexreturn}"></div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer::footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
