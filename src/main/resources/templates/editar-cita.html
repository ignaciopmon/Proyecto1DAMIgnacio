<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Cita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <h1>Editar Cita</h1>

    <form th:action="@{/citas/editar/{id}(id=${cita.id})}" th:object="${cita}" method="post" class="mt-4">

        <div class="mb-3">
            <label for="fecha" class="form-label">Fecha y Hora</label>
            <input type="datetime-local" id="fecha" th:field="*{fecha}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="duracionMinutos" class="form-label">Duración (minutos)</label>
            <input type="number" id="duracionMinutos" th:field="*{duracionMinutos}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="precio" class="form-label">Precio (€)</label>
            <input type="number" step="0.01" id="precio" th:field="*{precio}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="estado" class="form-label">Estado</label>
            <select id="estado" th:field="*{estado}" class="form-select" required>
                <option value="PENDIENTE">PENDIENTE</option>
                <option value="DISPONIBLE">DISPONIBLE</option>
                <option value="REALIZADA">REALIZADA</option>
                <option value="NO_PRESENTADO">NO PRESENTADO</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="observaciones" class="form-label">Observaciones</label>
            <textarea id="observaciones" th:field="*{observaciones}" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label for="medicoId" class="form-label">Médico</label>
            <select id="medicoId" name="medicoId" class="form-select" required>
                <option value="">-- Seleccionar médico --</option>
                <option th:each="medico : ${medicos}"
                        th:value="${medico.id}"
                        th:text="${medico.nombre} + ' - ' + ${medico.especialidad}"
                        th:selected="${cita.medico != null and cita.medico.id == medico.id}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="pacienteId" class="form-label">Paciente</label>
            <select id="pacienteId" name="pacienteId" class="form-select">
                <option value="">-- Sin paciente --</option>
                <option th:each="paciente : ${pacientes}"
                        th:value="${paciente.id}"
                        th:text="${paciente.nombre}"
                        th:selected="${cita.paciente != null and cita.paciente.id == paciente.id}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Guardar Cambios</button>
        <a href="/citas" class="btn btn-secondary">Cancelar</a>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
