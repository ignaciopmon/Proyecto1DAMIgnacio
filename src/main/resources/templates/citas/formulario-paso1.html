<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Programar Cita (Paso 1) - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg(v=1)}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar::navbar}"></div>

    <main class="container my-5 flex-grow-1">
        
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-1 small text-secondary">
                        <span>Paso 1: Elección de Especialista y Día</span>
                        <span>50% Completado</span>
                    </div>
                    <div class="progress" style="height: 6px;">
                        <div class="progress-bar bg-primary" role="progressbar" style="width: 50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-3 p-4">
                    <div class="card-body">
                        
                        <h2 class="fw-bold text-dark mb-1">Nueva Cita Médica</h2>
                        <p class="text-muted small mb-4">Seleccione el especialista y la fecha deseada para consultar la disponibilidad horaria</p>

                        <form th:action="@{/citas/paso2}" method="get">

                            <div class="mb-3">
                                <label for="medicoId" class="form-label text-secondary small fw-semibold">Especialista Médico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person-heart"></i></span>
                                    <select id="medicoId" name="medicoId" class="form-select border-start-0 ps-0" required>
                                        <option value="" th:if="${not esMedico}">-- Seleccionar especialista --</option>
                                        <option th:each="medico : ${medicos}" th:value="${medico.id}"
                                            th:text="${medico.nombre + ' - ' + medico.especialidad + ' (' + (medico.duracionCitaMinutos ?: 30) + ' min)'}"
                                            th:selected="${esMedico}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="fechaDia" class="form-label text-secondary small fw-semibold">Fecha de la Consulta</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-calendar-date"></i></span>
                                    <input type="date" id="fechaDia" name="fechaDia" class="form-control border-start-0 ps-0" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-5">
                                <a href="/citas" class="btn btn-outline-secondary px-4 py-2">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-4 py-2 fw-semibold">
                                    Consultar Horas <i class="bi bi-arrow-right ms-1"></i>
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </main>

    <div th:replace="~{fragments/footer::footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
