<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nueva Cita - Paso 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div th:replace="~{fragments/navbar::navbar}"></div>

    <div class="container my-4">
        <div class="progress mb-4">
            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" style="width: 50%"></div>
        </div>

        <h1 th:text="${cita.id != null} ? 'Editar Cita (' + ${cita.codigo} + ')' : 'Nueva Cita'">Nueva Cita</h1>
        <p class="text-muted">Paso 2 de 2: Completa los datos de la cita</p>

        <div th:if="${error != null}" class="alert alert-danger mb-4" role="alert" th:text="${error}">
            Mensaje de error
        </div>

        <div class="card mb-4 bg-light">
            <div class="card-body d-flex align-items-center gap-3">
                <span><strong>Médico:</strong>
                    <span th:text="${medico != null} ? ${medico.nombre + ' - ' + medico.especialidad} : '—'"></span>
                </span>
                <span>|</span>
                <span><strong>Día:</strong> <span th:text="${fechaDia}"></span></span>
                <a href="/citas/nueva" class="btn btn-sm btn-outline-secondary ms-auto"> Cambiar</a>
            </div>
        </div>

        <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{codigo}">
            <input type="hidden" name="medicoId" th:value="${medicoId}">
            <input type="hidden" name="fechaDia" th:value="${fechaDia}">

            <div class="mb-3">
                <label for="hora" class="form-label">Hora disponible</label>
                <select id="hora" name="hora" class="form-select" required
                        th:disabled="${horasDisponibles == null or #lists.isEmpty(horasDisponibles)}">
                    <option value="">-- Seleccionar hora --</option>
                    <option th:each="horaDisponible : ${horasDisponibles}"
                            th:value="${horaDisponible}"
                            th:text="${#temporals.format(horaDisponible, 'HH:mm')}"
                            th:selected="${horaSeleccionada != null and horaSeleccionada == horaDisponible}">
                    </option>
                </select>
                <div class="form-text text-danger"
                     th:if="${horasDisponibles == null or #lists.isEmpty(horasDisponibles)}">
                    No quedan horas libres para ese médico y ese día.
                    <a href="/citas/nueva"> Volver a elegir</a>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Precio</label>
                <p class="form-control-plaintext text-muted">
                    El price se calcula automáticamente según la tarifa del médico.
                </p>
            </div>

            <div class="mb-3">
                <label for="estado" class="form-label">Estado</label>
                <select id="estado" th:field="*{estado}" class="form-select" required>
                    <option th:each="est : ${estados}"
                            th:value="${est}"
                            th:text="${#strings.replace(est.toString(), '_', ' ')}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label for="observaciones" class="form-label">Observaciones</label>
                <textarea id="observaciones" th:field="*{observaciones}" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label for="pacienteId" class="form-label">Paciente</label>
                <select id="pacienteId" name="pacienteId" class="form-select">
                    <option value="">-- Sin paciente --</option>
                    <option th:each="paciente : ${pacientes}"
                            th:value="${paciente.id}"
                            th:text="${paciente.nombre}"
                            th:selected="${cita.paciente != null and cita.paciente.id == paciente.id}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-success">Guardar Cita</button>
            <a href="/citas" class="btn btn-secondary">Cancelar</a>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
