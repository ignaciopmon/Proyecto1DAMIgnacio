<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Citas - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div th:replace="~{fragments/navbar::navbar}"></div>

    <div class="container my-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Listado de Citas</h1>
            <div th:replace="fragments/indexreturn::indexreturn"></div>
        </div>

        <div class="mb-3">
            <a th:href="@{/citas/nueva}" class="btn btn-primary">
                Añadir Cita
            </a>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Código</th>
                            <th>Fecha</th>
                            <th>Duración</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Paciente</th>
                            <th>Médico</th>
                            <th>Observaciones</th>
                            <th sec:authorize="hasRole('ADMIN')">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cita : ${citas}">
                            <td><strong th:text="${cita.codigo}">CITA-12345678</strong></td>
                            <td th:text="${#temporals.format(cita.fecha, 'dd/MM/yyyy HH:mm')}">26/05/2026 10:00</td>
                            <td th:text="|${cita.duracionMinutos} min|">30 min</td>
                            <td th:text="|${cita.precio} €|">35 €</td>
                            <td>
                                <form th:action="@{'/citas/' + ${cita.id} + '/estado'}" method="post" class="m-0">
                                    <select name="estado" class="form-select form-select-sm" onchange="this.form.submit()">
                                        <option th:each="est : ${estados}"
                                                th:value="${est}"
                                                th:text="${#strings.replace(est.toString(), '_', ' ')}"
                                                th:selected="${cita.estado == est}">
                                        </option>
                                    </select>
                                </form>
                            </td>
                            <td th:text="${cita.paciente != null} ? ${cita.paciente.nombre} : 'Sin paciente'">Juan Pérez</td>
                            <td th:text="${cita.medico != null} ? ${cita.medico.nombre} : 'Sin médico'">Dr. Silva</td>
                            <td th:text="${cita.observaciones}">Observaciones</td>
                            <td sec:authorize="hasRole('ADMIN')">
                                <div class="d-flex gap-1">
                                    <a th:href="@{'/citas/editar/' + ${cita.id}}" class="btn btn-sm btn-warning">Editar</a>
                                    <a th:href="@{'/citas/eliminar/' + ${cita.id}}" class="btn btn-sm btn-danger"
                                       onclick="return confirm('¿Estás seguro de que quieres eliminar esta cita?')">Eliminar</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
