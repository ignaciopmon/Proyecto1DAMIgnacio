<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="container mt-4">
    <h1>Citas</h1>

    <div th:replace="fragments/indexreturn::indexreturn"></div>

    <div class="mb-3">
        <a th:href="@{/citas/nueva}" class="btn btn-primary">Añadir Cita</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Código</th>
                <th>Fecha</th>
                <th>Duracion</th>
                <th>Precio</th>
                <th>Estado</th>
                <th>Paciente</th>
                <th>Medico</th>
                <th>Observaciones</th>
                <th sec:authorize="hasRole('ADMIN')">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cita : ${citas}">
                <td th:text="${cita.id}">1</td>
                <td th:text="${cita.codigo}">CITA-12345678</td>
                <td th:text="${#temporals.format(cita.fecha, 'dd/MM/yyyy HH:mm')}">fecha</td>
                <td th:text="|${cita.duracionMinutos} minutos|">30 minutos</td>
                <td th:text="|${cita.precio} euros|">35 euros</td>
                <td>
                    <form th:action="@{'/citas/' + ${cita.id} + '/estado'}" method="post" style="margin:0" class="d-flex gap-1">
                        <select name="estado" class="form-select form-select-sm" onchange="form.submit()">
                            <option th:each="est : ${estados}"
                                    th:value="${est}"
                                    th:text="${#strings.replace(est.toString(), '_', ' ')}"
                                    th:selected="${cita.estado == est}">
                            </option>
                        </select>
                    </form>
                </td>
                <td th:text="${cita.paciente != null} ? ${cita.paciente.nombre} : 'Sin paciente'">P001</td>
                <td th:text="${cita.medico != null} ? ${cita.medico.nombre} : 'Sin médico'">M001</td>
                <td th:text="${cita.observaciones}">Observaciones</td>
                <td sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{'/citas/editar/' + ${cita.id}}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{'/citas/eliminar/' + ${cita.id}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de que quieres eliminar esta cita?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
