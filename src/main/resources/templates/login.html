<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClinicSoft - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container justify-content-center">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-heart-pulse me-2"></i>ClinicSoft
            </a>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5 col-xl-4">
                    <div class="card border-0 shadow-sm p-4">
                        <div class="card-body">
                            <div class="text-center mb-4">
                                <i class="bi bi-person-circle text-primary" style="font-size: 3rem;"></i>
                                <h3 class="fw-bold mt-2">Iniciar Sesión</h3>
                                <p class="text-muted">Accede a tu cuenta</p>
                            </div>

                            <div th:if="${param.error}" class="alert alert-danger text-center">
                                Usuario o contraseña incorrectos.
                            </div>
                            <div th:if="${param.logout}" class="alert alert-success text-center">
                                Has cerrado sesión correctamente.
                            </div>

                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label for="username" class="form-label fw-bold">Usuario</label>
                                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                                </div>
                                <div class="mb-4">
                                    <label for="password" class="form-label fw-bold">Contraseña</label>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                                </button>
                            </form>
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <a th:href="@{/}" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i>Volver al inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white text-center py-3 border-top mt-auto">
        <div class="container">
            <small class="text-muted">&copy; 2026 ClinicSoft</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
