<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg(v=1)}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand navbar-dark bg-primary shadow-sm">
        <div class="container justify-content-center">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
                <i class="bi bi-heart-pulse-fill"></i> ClinicSoft
            </a>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                    
                    <div class="card border-0 shadow-sm rounded-3 p-4">
                        <div class="card-body">
                            
                            <div class="text-center mb-4">
                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-3 d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px;">
                                    <i class="bi bi-lock-fill fs-3"></i>
                                </div>
                                <h3 class="fw-bold text-dark mb-1">Acceso Profesional</h3>
                                <p class="text-muted small">Introduce tus credenciales para acceder al sistema</p>
                            </div>

                            <div th:if="${param.error}" class="alert alert-danger border-0 small text-center rounded-3 mb-4">
                                Usuario o contraseña incorrectos.
                            </div>
                            <div th:if="${param.logout}" class="alert alert-success border-0 small text-center rounded-3 mb-4">
                                Sesión cerrada correctamente.
                            </div>

                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label for="username" class="form-label text-secondary small fw-semibold">Nombre de Usuario</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Nombre de usuario" required autofocus>
                                    </div>
                                </div>
                                
                                <div class="mb-4">
                                    <label for="password" class="form-label text-secondary small fw-semibold">Contraseña de Seguridad</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-key"></i></span>
                                        <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-semibold d-flex align-items-center justify-content-center gap-2">
                                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                                </button>
                            </form>

                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <a th:href="@{/}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i>Volver a la página de inicio</a>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer::footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
