<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nueva Cita - Paso 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <div class="progress mb-4" style="height: 20px">
        <div class="progress-bar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0"
            aria-valuemax="100">0%</div>
    </div>

    <h1>Nueva Cita</h1>
    <p class="text-muted">Paso 1 de 2: Elige médico y día</p>

    <form th:action="@{/citas/paso2}" method="get" class="mt-4">

        <div class="mb-3">
            <label for="medicoId" class="form-label">Médico</label>
            <select id="medicoId" name="medicoId" class="form-select" required>
                <option value="">-- Seleccionar médico --</option>
                <option th:each="medico : ${medicos}"
                        th:value="${medico.id}"
                        th:text="${medico.nombre + ' - ' + medico.especialidad + ' (' + (medico.duracionCitaMinutos ?: 30) + ' min)'}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="fechaDia" class="form-label">Día</label>
            <input type="date" id="fechaDia" name="fechaDia" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Ver horas disponibles →</button>
        <a href="/citas" class="btn btn-secondary">Cancelar</a>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
