<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ficha del Médico - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg(v=1)}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar::navbar}"></div>

    <main class="container my-5 flex-grow-1">
        
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                
                <div th:if="${error != null}" class="alert alert-danger border-0 p-3 rounded-3 mb-4 d-flex align-items-center gap-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span class="small" th:text="${error}">Mensaje de error</span>
                </div>

                <div class="card border-0 shadow-sm rounded-3 p-4">
                    <div class="card-body">
                        
                        <h2 class="fw-bold text-dark mb-1" th:text="${medico.id != null} ? 'Modificar Especialista' : 'Registrar Nuevo Especialista'">Formulario Médico</h2>
                        <p class="text-muted small mb-4">Complete la información profesional y la configuración de facturación para el especialista médico</p>

                        <form th:action="@{/medicos/nuevo/submit}" th:object="${medico}" method="post" class="mt-4">

                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:field="*{usuario}">

                            <div class="mb-3">
                                <label for="nombre" class="form-label text-secondary small fw-semibold">Nombre Completo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                    <input type="text" id="nombre" th:field="*{nombre}" class="form-control border-start-0 ps-0" placeholder="ej. Dra. Ana Martínez" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="especialidad" class="form-label text-secondary small fw-semibold">Especialidad Asistencial</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-award"></i></span>
                                    <input type="text" id="especialidad" th:field="*{especialidad}" class="form-control border-start-0 ps-0" placeholder="ej. Pediatría / Dermatología" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="duracionCitaMinutos" class="form-label text-secondary small fw-semibold">Duración Estándar de Consulta (minutos)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-clock"></i></span>
                                    <input type="number" id="duracionCitaMinutos" th:field="*{duracionCitaMinutos}" class="form-control border-start-0 ps-0" min="5" step="5" required>
                                </div>
                                <div class="form-text text-muted small mt-1">Tiempo de consulta predeterminado en minutos (mínimo 5 min).</div>
                            </div>

                            <div class="mb-4">
                                <label for="precioPorMinuto" class="form-label text-secondary small fw-semibold">Precio por Minuto (€)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-currency-euro"></i></span>
                                    <input type="number" step="0.01" id="precioPorMinuto" th:field="*{precioPorMinuto}" class="form-control border-start-0 ps-0" min="0" required>
                                </div>
                                <div class="form-text text-muted small mt-1">Precio imputado por minuto de atención (se usa para calcular el coste de la cita).</div>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-5">
                                <a href="/medicos" class="btn btn-outline-secondary px-4 py-2">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-4 py-2 fw-semibold">
                                    Guardar Especialista
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </main>

    <div th:replace="~{fragments/footer::footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
