<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Médicos - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar::navbar}"></div>

    <div class="container my-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Listado de Médicos</h1>
            <div th:replace="fragments/indexreturn::indexreturn"></div>
        </div>

        <div class="mb-3" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/medicos/nuevo}" class="btn btn-primary">
                Añadir Médico
            </a>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Especialidad</th>
                            <th>Duración (min)</th>
                            <th>Precio/min (€)</th>
                            <th sec:authorize="hasRole('ADMIN')">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="medico : ${medicos}">
                            <td><strong th:text="${medico.id}">1</strong></td>
                            <td th:text="${medico.nombre}">Nombre</td>
                            <td th:text="${medico.especialidad}">Especialidad</td>
                            <td th:text="|${medico.duracionCitaMinutos} min|">30 min</td>
                            <td th:text="|${medico.precioPorMinuto} €|">1.50 €</td>
                            <td sec:authorize="hasRole('ADMIN')">
                                <div class="d-flex gap-1">
                                    <a th:href="@{'/medicos/editar/' + ${medico.id}}" class="btn btn-sm btn-warning">Editar</a>
                                    <form th:action="@{'/medicos/eliminar/' + ${medico.id}}" method="post" class="m-0"
                                          onsubmit="return confirm('¿Estás seguro de que quieres eliminar este médico?')">
                                        <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments/footer::footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
