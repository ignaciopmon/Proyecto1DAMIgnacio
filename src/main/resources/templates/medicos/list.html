<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Medicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <h1>Medicos</h1>

    <div th:replace="fragments/indexreturn::indexreturn"></div>

    <div class="mb-3" sec:authorize="hasRole('ADMIN')">
        <a href="/medicos/nuevo" class="btn btn-primary">Añadir Médico</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Especialidad</th>
                <th>Duración (min)</th>
                <th>Precio/min (€)</th>
                <th sec:authorize="hasRole('ADMIN')">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="medico : ${medicos}">
                <td th:text="${medico.id}">1</td>
                <td th:text="${medico.nombre}">Nombre</td>
                <td th:text="${medico.especialidad}">Especialidad</td>
                <td th:text="${medico.duracionCitaMinutos}">30</td>
                <td th:text="${medico.precioPorMinuto + ' €'}">1.50 €</td>
                <td sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{'/medicos/editar/' + ${medico.id}}" class="btn btn-sm btn-warning">Editar</a>
                    <form th:action="@{'/medicos/eliminar/' + ${medico.id}}" method="post" class="d-inline"
                        onsubmit="return confirm('¿Estás seguro de que quieres eliminar este médico?')">
                        <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>



</html>
