<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configurar Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h1>Configurar Mi Perfil</h1>

    <form th:action="@{/medico/perfil/guardar}" th:object="${medico}" method="post" class="mt-4">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{username}">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="especialidad" class="form-label">Especialidad</label>
            <input type="text" id="especialidad" th:field="*{especialidad}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="duracionCitaMinutos" class="form-label">Duración de citas por defecto (minutos)</label>
            <input type="number" id="duracionCitaMinutos" th:field="*{duracionCitaMinutos}" class="form-control" min="15" max="120" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar Cambios</button>
        <a href="/medico/citas" class="btn btn-secondary">Cancelar</a>
    </form>

</body>
</html>
