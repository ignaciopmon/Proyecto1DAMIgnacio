<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historia de Paciente - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg(v=1)}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar::navbar}"></div>

    <main class="container my-5 flex-grow-1">
        
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                
                <div th:if="${error != null}" class="alert alert-danger border-0 p-3 rounded-3 mb-4 d-flex align-items-center gap-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span class="small" th:text="${error}">Mensaje de error</span>
                </div>

                <div class="card border-0 shadow-sm rounded-3 p-4">
                    <div class="card-body">
                        
                        <h2 class="fw-bold text-dark mb-1" th:text="${paciente.id != null} ? 'Modificar Paciente' : 'Registrar Nuevo Paciente'">Formulario Paciente</h2>
                        <p class="text-muted small mb-4">Complete los datos de la ficha personal del paciente para el registro de su historial clínico</p>

                        <form th:action="@{/pacientes/nuevo/submit}" th:object="${paciente}" method="post" class="mt-4">

                            <input type="hidden" th:field="*{id}">

                            <div class="form-floating mb-3">
                                <input type="text" id="nombre" th:field="*{nombre}" class="form-control" placeholder="ej. María López" required>
                                <label for="nombre" class="text-secondary"><i class="bi bi-person me-2"></i>Nombre Completo</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="ej. maria.lopez@dominio.com" required>
                                <label for="email" class="text-secondary"><i class="bi bi-envelope me-2"></i>Dirección de Correo Electrónico</label>
                                <div class="form-text text-muted small mt-1">Se utilizará para notificaciones de citas.</div>
                            </div>

                            <div class="form-floating mb-4">
                                <input type="text" id="telefono" th:field="*{telefono}" class="form-control" placeholder="ej. 612345678" required>
                                <label for="telefono" class="text-secondary"><i class="bi bi-telephone me-2"></i>Teléfono Móvil / Fijo</label>
                                <div class="form-text text-muted small mt-1">Debe constar de exactamente 9 dígitos numéricos.</div>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-5">
                                <a href="/pacientes" class="btn btn-outline-secondary px-4 py-2">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-4 py-2 fw-semibold">
                                    Guardar Paciente
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </main>

    <div th:replace="~{fragments/footer::footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
