<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pacientes - ClinicSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div th:replace="~{fragments/navbar::navbar}"></div>

    <div class="container my-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Listado de Pacientes</h1>
            <div th:replace="fragments/indexreturn::indexreturn"></div>
        </div>

        <div class="mb-3">
            <a th:href="@{/pacientes/nuevo}" class="btn btn-primary">
                Añadir Paciente
            </a>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th sec:authorize="hasRole('ADMIN')">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="paciente : ${pacientes}">
                            <td><strong th:text="${paciente.id}">1</strong></td>
                            <td th:text="${paciente.nombre}">Nombre</td>
                            <td th:text="${paciente.email}">email</td>
                            <td th:text="${paciente.telefono}">telefono</td>
                            <td sec:authorize="hasRole('ADMIN')">
                                <div class="d-flex gap-1">
                                    <a th:href="@{'/pacientes/editar/' + ${paciente.id}}" class="btn btn-sm btn-warning">Editar</a>
                                    <a th:href="@{'/pacientes/eliminar/' + ${paciente.id}}" class="btn btn-sm btn-danger"
                                       onclick="return confirm('¿Estás seguro de que quieres eliminar este paciente?')">Eliminar</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
