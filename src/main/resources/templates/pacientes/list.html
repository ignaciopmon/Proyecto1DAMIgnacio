<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <h1>Pacientes</h1>

    <div th:replace="fragments/indexreturn::indexreturn"></div>

    <div class="mb-3">
        <a href="/pacientes/nuevo" class="btn btn-primary">Añadir Paciente</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Telefono</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="paciente : ${pacientes}">
                <td th:text="${paciente.id}">1</td>
                <td th:text="${paciente.nombre}">Nombre</td>
                <td th:text="${paciente.email}">email</td>
                <td th:text="${paciente.telefono}">telefono</td>
                <td>
                    <a th:href="@{'/pacientes/editar/' + ${paciente.id}}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{'/pacientes/eliminar/' + ${paciente.id}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de que quieres eliminar este paciente?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
