<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Medicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <h1>Medicos</h1>

    <div th:replace="fragments/indexreturn::indexreturn"></div>

    <div class="mb-3">
        <a href="/medicos/nuevo" class="btn btn-primary">Añadir Médico</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Especialidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="medico : ${medicos}">
                <td th:text="${medico.id}">1</td>
                <td th:text="${medico.nombre}">Nombre</td>
                <td th:text="${medico.especialidad}">Especialidad</td>
                <td>
                    <a th:href="@{'/medicos/editar/' + ${medico.id}}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{'/medicos/eliminar/' + ${medico.id}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de que quieres eliminar este médico?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>



</html>
