<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Formulario Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <h1 th:text="${medico.id != null} ? 'Editar Médico' : 'Añadir Nuevo Médico'">Formulario Médico</h1>

    <form th:action="@{/medicos/nuevo/submit}" th:object="${medico}" method="post" class="mt-4">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="especialidad" class="form-label">Especialidad</label>
            <input type="text" id="especialidad" th:field="*{especialidad}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="duracionCitaMinutos" class="form-label">Duracion de cada cita (minutos)</label>
            <input type="number" id="duracionCitaMinutos" th:field="*{duracionCitaMinutos}" class="form-control" min="5" step="5" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/medicos" class="btn btn-secondary">Cancelar</a>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
