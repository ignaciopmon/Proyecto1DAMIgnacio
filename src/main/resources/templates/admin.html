<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClinicSoft - Gestión Clínica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-heart-pulse me-2"></i>ClinicSoft
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/pacientes}"><i class="bi bi-people me-1"></i>Pacientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/medicos}"><i class="bi bi-person-badge me-1"></i>Médicos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/citas}"><i class="bi bi-calendar-check me-1"></i>Citas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="bg-primary bg-gradient text-white py-5">
        <div class="container text-center">
            <p class="lead mb-0">Sistema de gestión de clínica médica</p>
        </div>
    </div>


    <div class="container my-5">

        <h2 class="text-center mb-4">Resumen general</h2>

        <div class="row g-4 justify-content-center">


            <div class="col-md-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <i class="bi bi-people-fill text-primary fs-1"></i>
                        <h5 class="card-title mt-3">Pacientes</h5>
                        <p class="display-6 fw-bold text-primary" th:text="${numeroPacientes}">0</p>
                        <p class="text-muted">registrados</p>
                        <a th:href="@{/pacientes}" class="btn btn-outline-primary btn-sm">Ver pacientes</a>
                    </div>
                </div>
            </div>


            <div class="col-md-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <i class="bi bi-person-badge-fill text-success fs-1"></i>
                        <h5 class="card-title mt-3">Médicos</h5>
                        <p class="display-6 fw-bold text-success" th:text="${numeroMedicos}">0</p>
                        <p class="text-muted">registrados</p>
                        <a th:href="@{/medicos}" class="btn btn-outline-success btn-sm">Ver médicos</a>
                    </div>
                </div>
            </div>


            <div class="col-md-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <i class="bi bi-calendar-check-fill text-info fs-1"></i>
                        <h5 class="card-title mt-3">Citas</h5>
                        <p class="display-6 fw-bold text-info" th:text="${numeroCitas}">0</p>
                        <p class="text-muted">creadas</p>
                        <a th:href="@{/citas}" class="btn btn-outline-info btn-sm">Ver citas</a>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <small>2026 ClinicSoft - Gestión Clínica</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
