<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Citas</title>
</head>

<body>
    <h1>Citas</h1>

    <div th:replace="fragments/indexreturn::indexreturn"></div>

    <table border="1">
        <thead>
            <tr>
                <th>Codigo</th>
                <th>Fecha</th>
                <th>Duracion</th>
                <th>Precio</th>
                <th>Estado</th>
                <th>Paciente</th>
                <th>Medico</th>
                <th>Observaciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cita : ${citas}">
                <td th:text="${cita.codCita}">C001</td>
                <td th:text="${cita.fecha}">fecha</td>
                <td th:text="|${cita.duracionMinutos} minutos|">30 minutos</td>
                <td th:text="|${cita.precio} euros|">35 euros</td>
                <td th:text="${cita.estado}">PENDIENTE</td>
                <td th:text="${cita.paciente != null} ? ${cita.paciente.nombre} : 'Sin paciente'">P001</td>
                <td th:text="${cita.medico.nombre}">M001</td>
                <td th:text="${cita.observaciones}">Observaciones</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
